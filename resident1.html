<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premier Residences | King Charmer Industries</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
            --text-light: #f4f4f4;
            --overlay: rgba(0, 0, 0, 0.98);
        }

        body { background-color: var(--dark-bg); color: var(--text-light); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 80px; }

        header { text-align: center; padding: 50px 20px; background: linear-gradient(to bottom, #111, var(--dark-bg)); }
        h1 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 2.5rem; letter-spacing: 5px; margin-bottom: 10px; }

        .residence-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 30px; max-width: 1250px; margin: 0 auto; padding: 20px; }
        
        .res-card { background: var(--card-bg); border: 1px solid #222; position: relative; }
        .res-img-container { cursor: pointer; position: relative; overflow: hidden; }
        .res-img { width: 100%; height: 300px; object-fit: cover; transition: 0.4s; }
        .res-img-container:hover .res-img { transform: scale(1.05); }
        .res-img-container::after { content: 'View Gallery'; position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); padding: 5px 10px; font-size: 0.7rem; border: 1px solid var(--gold); }

        .res-content { padding: 25px; }
        .res-title { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.3rem; margin: 0 0 10px 0; }
        .res-price { font-size: 1.1rem; margin-bottom: 20px; display: flex; justify-content: space-between; }
        
        .btn-group { display: flex; gap: 10px; }
        .action-btn { flex: 1; padding: 15px; background: none; border: 1px solid var(--gold); color: var(--gold); font-family: 'Cinzel', serif; cursor: pointer; transition: 0.3s; text-transform: uppercase; text-align: center; text-decoration: none; font-size: 0.9rem; }
        .action-btn:hover { background: var(--gold); color: #000; }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #111; border: 1px solid var(--gold); padding: 40px; max-width: 600px; width: 90%; text-align: center; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: var(--gold); font-size: 2rem; cursor: pointer; }
        
        /* Gallery specific */
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .gallery-grid img { width: 100%; height: 100px; object-fit: cover; border: 1px solid #333; }
        .modal-main-img { width: 100%; height: 300px; object-fit: cover; margin-bottom: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>Elite Living</h1>
    </header>

    <main class="residence-grid" id="residenceGrid">
        </main>

    <div id="rentModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('rentModal')">&times;</span>
            <h2>Private Leasing</h2>
            <div style="text-align: left; font-family: monospace; background: #000; padding: 20px; border-left: 2px solid var(--gold);">
                BANK: GLOBAL ELITE TRUST<br>ACC: 0988 2211 4433
            </div>
            <p><strong>Concierge:</strong> +1 (555) KC-HOME</p>
        </div>
    </div>

    <div id="galleryModal" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <span class="close-btn" onclick="closeModal('galleryModal')">&times;</span>
            <h2 id="galleryTitle">Property Name</h2>
            <img id="mainGalleryImg" src="" class="modal-main-img">
            <div class="gallery-grid" id="galleryGrid"></div>
        </div>
    </div>
<script>
    const properties = [
        { title: "The Obsidian Villa", price: "$12,500", mainImg: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=800", gallery: ["https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=800", "https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=800", "https://images.unsplash.com/photo-1600566753190-17f0baa2a6c3?w=800"] },
        { title: "Church Hill", price: "$2,500", mainImg: "4.jpg", gallery: ["4.jpg", "https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=800"] },
        { title: "Luxruy Mansion", price: "$102,500", mainImg: "ss.jpg", gallery: ["ss.jpg", "sss.jpg"] },
        { title: "3 bed room flat", price: "$102,500", mainImg: "s1.jpg", gallery: ["s1.jpg", "ss1.jpg"] },
        { title: "5 bed room mhongalow", price: "$102,500", mainImg: "44.jpg", gallery: ["44.jpg", "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=800"] },
        // ... add as many as you want without worrying about IDs!
        { title: "Sky-Line Penthouse", price: "$8,900", mainImg: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=800", gallery: ["https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=800", "s.png"] }
    ];

    function renderCards() {
        const grid = document.getElementById('residenceGrid');
        grid.innerHTML = ''; // Clear grid first
        properties.forEach((p, index) => {
            grid.innerHTML += `
            <div class="res-card">
                <div class="res-img-container" onclick="openGallery(${index})">
                    <img src="${p.mainImg}" class="res-img" alt="${p.title}">
                </div>
                <div class="res-content">
                    <h2 class="res-title">${p.title}</h2>
                    <div class="res-price"><span class="price-tag">${p.price}</span><span>/ MONTH</span></div>
                    <div class="btn-group">
                        <button class="action-btn" onclick="openModal('rentModal')">Rent Now</button>
                        <a href="tel:+2347086312481" class="action-btn">Call Now</a>
                    </div>
                </div>
            </div>`;
        });
    }

    function openGallery(index) {
        const p = properties[index];
        document.getElementById('galleryTitle').innerText = p.title;
        document.getElementById('mainGalleryImg').src = p.mainImg;
        const grid = document.getElementById('galleryGrid');
        grid.innerHTML = '';
        p.gallery.forEach(img => {
            grid.innerHTML += `<img src="${img}" onclick="document.getElementById('mainGalleryImg').src='${img}'" style="cursor:pointer">`;
        });
        document.getElementById('galleryModal').style.display = 'flex';
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    
    window.onclick = function(event) {
        if (event.target.className === 'modal') { event.target.style.display = "none"; }
    }

    renderCards();
</script>
